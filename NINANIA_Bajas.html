<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NINANIA — Bajas & Mermas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#07090e;--s1:#0d1018;--b1:#1c2233;--b2:#263045;--tx:#dde4f2;--tx2:#8898b8;--tx3:#445068;--accent:#e8c84a;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;background:rgba(7,9,14,.96);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;padding:0 20px;height:54px;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--tx3);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-decoration:none;padding:5px 12px;border:1px solid var(--b2);border-radius:6px;transition:all .2s;flex-shrink:0;}
.back-btn:hover{color:var(--accent);border-color:#6b4508;}
.topbar-title{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--tx2);letter-spacing:.08em;}
.topbar-file{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:.08em;margin-left:auto;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;}
.inner{text-align:center;max-width:420px;}
.icon{font-family:var(--mono);font-size:56px;color:var(--b2);margin-bottom:28px;}
.title{font-size:28px;font-weight:600;color:var(--tx);margin-bottom:10px;}
.sub{font-size:14px;color:var(--tx2);line-height:1.65;margin-bottom:12px;}
.file-badge{display:inline-block;font-family:var(--mono);font-size:10px;color:var(--tx3);background:var(--s1);border:1px solid var(--b1);padding:4px 12px;border-radius:4px;letter-spacing:.08em;margin-top:8px;}
</style>
</head>
<body>
<div class="topbar">
  <a class="back-btn" href="NINANIA_Hub.html">← HUB</a>
  <div class="topbar-title">BAJAS & MERMAS</div>
  <div class="topbar-file">NINANIA_Bajas.html</div>
</div>
<div class="main">
  <div class="inner">
    <div class="icon">↓</div>
    <div class="title">Bajas & Mermas</div>
    <div class="sub">Control de productos dados de baja por calidad, vencimiento o consumo interno no autorizado.</div>
    <div class="sub" style="font-size:12px;color:var(--tx3);">Este módulo está en construcción y estará disponible próximamente.</div>
    <div class="file-badge">NINANIA_Bajas.html</div>
  </div>
</div>
</body>
</html>
